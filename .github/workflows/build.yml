name: Build

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    release:
        types: [created]

jobs:
    build-linux:
        name: Linux (GCC)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download miniaudio.h
              run: |
                  curl -fsSL \
                    https://raw.githubusercontent.com/mackron/miniaudio/master/miniaudio.h \
                    -o miniaudio.h

            - name: Install audio dependencies
              run: sudo apt-get update && sudo apt-get install -y libasound2-dev

            - name: Build
              run: |
                  g++ -O2 -std=c++17 \
                    -o netsymphony \
                    src/main.cpp \
                    -lpthread -ldl -lm
                  strip netsymphony

            - name: Verify binary
              run: file netsymphony

            - name: Upload Linux artifact
              uses: actions/upload-artifact@v4
              with:
                  name: netsymphony-linux-x86_64
                  path: netsymphony
                  retention-days: 30

    build-windows:
        name: Windows (MSVC)
        runs-on: windows-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Download miniaudio.h
              run: |
                  Invoke-WebRequest `
                    -Uri "https://raw.githubusercontent.com/mackron/miniaudio/master/miniaudio.h" `
                    -OutFile "miniaudio.h"
              shell: pwsh

            - name: Set up MSVC
              uses: ilammy/msvc-dev-cmd@v1

            - name: Build
              run: |
                  cl /O2 /std:c++17 /EHsc /W3 ^
                    src\main.cpp ^
                    /Fe:netsymphony.exe ^
                    ws2_32.lib
              shell: cmd

            - name: Verify binary
              run: Get-Item netsymphony.exe | Select-Object Name, Length
              shell: pwsh

            - name: Upload Windows artifact
              uses: actions/upload-artifact@v4
              with:
                  name: netsymphony-windows-x86_64
                  path: netsymphony.exe
                  retention-days: 30

    release:
        name: Attach binaries to release
        runs-on: ubuntu-latest
        needs: [build-linux, build-windows]
        if: github.event_name == 'release'

        steps:
            - name: Download Linux artifact
              uses: actions/download-artifact@v4
              with:
                  name: netsymphony-linux-x86_64
                  path: dist/linux

            - name: Download Windows artifact
              uses: actions/download-artifact@v4
              with:
                  name: netsymphony-windows-x86_64
                  path: dist/windows

            - name: Package artifacts
              run: |
                  cd dist/linux
                  chmod +x netsymphony
                  zip ../../netsymphony-linux-x86_64.zip netsymphony
                  cd ../windows
                  zip ../../netsymphony-windows-x86_64.zip netsymphony.exe

            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      netsymphony-linux-x86_64.zip
                      netsymphony-windows-x86_64.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
